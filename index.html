<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: linear-gradient(135deg, var(--primary), #388e3c); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; padding: 10px; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .nav-btn { background: #f8fafc; border: 1px solid #ddd; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; color: var(--primary); transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .report-btn { background: #ff9800 !important; color: white !important; border: none !important; }
        .balance-card { max-width: 950px; margin: 20px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
        .balance-item div { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .main-wrapper { display: flex; max-width: 1250px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #input-panel { flex: 0 0 320px; height: fit-content; }
        #display-panel { flex: 1; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f4f7f4; color: var(--primary); }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
        @media (max-width: 850px) { .main-wrapper { flex-direction: column; } #input-panel { width: 100%; } }
        @media print { header, .nav-menu, #input-panel, button { display: none !important; } .panel { box-shadow: none; width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button style="position: absolute; right: 15px; top: 20px; background: var(--accent); border: none; padding: 8px 15px; border-radius: 50px; font-weight: bold; cursor: pointer;" onclick="fetchData()">🔄 Sync Now</button>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase;">DASHBOARD</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>CASH IN (+)</span><div id="total-in">₹0</div></div>
        <div class="balance-item"><span>CASH OUT (-)</span><div id="total-out">₹0</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>NET BALANCE</span><div id="net-balance">₹0</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn report-btn" onclick="showSection('reports', this)">📊 YEARLY REPORT</button>
</div>

<div class="main-wrapper">
    <div id="input-panel" class="panel">
        <h3>New Entry</h3>
        <label>Date:</label>
        <input type="date" id="entryDate">
        <label>Details:</label>
        <div id="desc-container"></div>
        <label>Amount (₹):</label>
        <input type="number" id="amt" placeholder="0.00">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status"></div>
    </div>

    <div id="display-panel" class="panel">
        <h3 id="panel-title">History Log</h3>
        <table id="main-table">
            <thead id="table-head"></thead>
            <tbody id="list-body"></tbody>
        </table>
        <button onclick="window.print()" style="width:100%; margin-top:20px; padding:12px; background:#455a64; color:white; border:none; border-radius:10px; cursor:pointer; font-weight:bold;">🖨️ Print Ledger</button>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxVsm9P8FLiDwq-yxdKdn5LxF8RSTIDhvNfEG8r_OWL0xWRDgTGHp8q2FnrcKUjFaYaIA/exec';
    let currentSheet = 'daily';

    const staffNames = ["Akash Munim", "Ashok Munim", "Akhil Foreman", "Satnaryan Rafu", "Malkeet Roti", "Kamlesh Labour", "Kaali Labour"];
    const bankNames = ["Pankaj Palish", "Shangam Enterprices", "Broken Payment", "Cash"];
    const indNames = ["Karamjeet", "Sukhwinder", "Jaswinder"];

    window.onload = () => {
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        showSection('daily', document.querySelector('.nav-btn'));
    };

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const inputPanel = document.getElementById('input-panel');
        
        if(sheet === 'reports') {
            inputPanel.style.display = 'none';
            fetchReports();
        } else {
            inputPanel.style.display = 'block';
            setupInputs(sheet);
            fetchData();
        }
    }

    function setupInputs(sheet) {
        const container = document.getElementById('desc-container');
        if(sheet === 'daily') {
            let iOpts = indNames.map(n => `<option value="${n}">${n}</option>`).join('');
            let pOpts = staffNames.map(s => `<option value="${s} (Staff)">${s}</option>`).join('');
            let bOpts = bankNames.map(b => `<option value="${b} (Bank)">${b}</option>`).join('');
            container.innerHTML = `<select id="quickDesc" onchange="setDesc(this.value)"><option value="">-- Choose Account --</option><optgroup label="Individuals">${iOpts}</optgroup><optgroup label="Staff">${pOpts}</optgroup><optgroup label="Banks">${bOpts}</optgroup><option value="CUSTOM">Type Manual...</option></select><input type="text" id="desc" placeholder="Details...">`;
        } else if(sheet === 'salary') {
            container.innerHTML = `<select id="desc">${staffNames.map(s => `<option value="${s}">${s}</option>`).join('')}</select>`;
        } else {
            container.innerHTML = `<input type="text" id="desc" placeholder="Details...">`;
        }
    }

    function setDesc(v) { const d = document.getElementById('desc'); if(v === "CUSTOM") { d.value = ""; d.focus(); } else if(v !== "") { d.value = v; } }

    async function fetchData() {
        const body = document.getElementById('list-body');
        const head = document.getElementById('table-head');
        body.innerHTML = "<tr><td colspan='4' style='text-align:center;'>🔄 Syncing History...</td></tr>";
        head.innerHTML = "<tr><th>Date</th><th>Description</th><th>Cash In</th><th>Cash Out</th></tr>";

        try {
            const res = await fetch(`${scriptURL}?sheet=${currentSheet}&t=${new Date().getTime()}`);
            const data = await res.json();
            
            document.getElementById('sheet-title').innerText = currentSheet.toUpperCase();
            document.getElementById('total-in').innerText = "₹" + Number(data.totalIn || 0).toLocaleString();
            document.getElementById('total-out').innerText = "₹" + Number(data.totalOut || 0).toLocaleString();
            document.getElementById('net-balance').innerText = "₹" + Number(data.balance || 0).toLocaleString();

            body.innerHTML = data.history.reverse().map(i => `<tr>
                <td>${new Date(i.date).toLocaleDateString('en-IN')}</td>
                <td>${i.desc || '-'}</td>
                <td style="color:green">${i.in > 0 ? '₹'+Number(i.in).toLocaleString() : '-'}</td>
                <td style="color:red">${i.out > 0 ? '₹'+Number(i.out).toLocaleString() : '-'}</td>
            </tr>`).join('');
        } catch (e) { body.innerHTML = "<tr><td colspan='4' style='text-align:center; color:red;'>Sync Error! Check Apps Script Deployment.</td></tr>"; }
    }

    async function fetchReports() {
        const body = document.getElementById('list-body');
        const head = document.getElementById('table-head');
        body.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Calculating Year-to-Date...</td></tr>";
        head.innerHTML = "<tr><th>Month</th><th>Opening</th><th>In</th><th>Out</th><th>Closing</th></tr>";
        
        try {
            const res = await fetch(`${scriptURL}?action=getReports&t=${new Date().getTime()}`);
            const data = await res.json();
            body.innerHTML = Object.keys(data.monthly).map(m => {
                let r = data.monthly[m];
                return `<tr><td><b>${m}</b></td><td>₹${r.opening.toLocaleString()}</td><td style="color:green">+₹${r.in.toLocaleString()}</td><td style="color:red">-₹${r.out.toLocaleString()}</td><td><b>₹${r.closing.toLocaleString()}</b></td></tr>`;
            }).join('');
            document.getElementById('net-balance').innerText = "₹" + Number(data.grandTotal).toLocaleString();
        } catch (e) { body.innerHTML = "Error loading report."; }
    }

    function sendData(type) {
        const d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        const dt = document.getElementById('entryDate').value;
        if(!d || !a) return alert("Fill details!");
        document.getElementById('status').innerText = "⏳ Saving...";
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ targetSheet: currentSheet, description: d, amount: a, type: type, customDate: dt })})
        .then(() => {
            document.getElementById('status').innerText = "✓ Saved!";
            document.getElementById('amt').value = '';
            setTimeout(() => { fetchData(); document.getElementById('status').innerText = ""; }, 1500);
        });
    }
</script>
</body>
</html>
