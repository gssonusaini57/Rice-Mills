<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: #f0f4f0; color: #333; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        
        /* Balance Card */
        .balance-card { max-width: 450px; margin: 15px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .balance-item span { font-size: 0.7rem; text-transform: uppercase; opacity: 0.8; letter-spacing: 1px; }
        .balance-item div { font-size: 1.1rem; font-weight: bold; margin-top: 5px; }

        /* Navigation */
        .nav-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; padding: 10px; max-width: 450px; margin: auto; }
        .nav-btn { background: white; border: 2px solid var(--primary); padding: 10px; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary); transition: 0.3s; font-size: 0.85rem; }
        .nav-btn.active { background: var(--primary); color: white; }

        /* Form & History Container */
        .container { max-width: 420px; margin: 10px auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; }
        input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        /* Vertical History */
        .history-section { max-width: 420px; margin: 15px auto; background: #fff; padding: 15px; border-radius: 15px; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; align-items: center; }
        .hist-info { display: flex; flex-direction: column; }
        .hist-desc { font-weight: bold; font-size: 0.95rem; }
        .hist-amt-in { color: var(--secondary); font-weight: bold; }
        .hist-amt-out { color: var(--red); font-weight: bold; }
        
        #status { text-align: center; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0; font-size:1.4rem;">KRISHAN RICE MILLS</h1>
    <p style="margin:5px 0 0; font-size:0.8rem; opacity:0.9;">Digital Hisaab-Kitaab Portal</p>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; font-size:0.9rem; letter-spacing:1px;">DAILY BALANCE</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>Jama (In)</span><div id="total-in">₹0</div></div>
        <div class="balance-item"><span>Kharcha (Out)</span><div id="total-out">₹0</div></div>
        <div class="balance-item"><span>Bachat (Net)</span><div id="net-balance" style="color:var(--accent)">₹0</div></div>
    </div>
    <button onclick="fetchData()" style="background:none; border:1px solid white; color:white; border-radius:5px; margin-top:10px; padding:4px 12px; font-size:0.7rem; cursor:pointer;">⟳ Refresh Data</button>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank Account</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff Salary</button>
    <button class="nav-btn" onclick="showSection('labour', this)">Labour Cash</button>
</div>

<div class="container">
    <div class="form-group">
        <label>Vivran (Details):</label>
        <input type="text" id="desc" placeholder="Details likhein...">
    </div>
    <div class="form-group">
        <label>Rashi (Amount ₹):</label>
        <input type="number" id="amt" placeholder="0.00">
    </div>
    <div class="btn-group">
        <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
        <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
    </div>
    <div id="status"></div>
</div>

<div class="history-section">
    <h3 style="margin:0 0 10px; font-size:1rem; color:var(--primary);">Recent History</h3>
    <div id="history-list"><small>Loading history...</small></div>
</div>

<script>
    // Aapka Provide kiya hua Naya Script URL
    const scriptURL = 'https://script.google.com/macros/s/AKfycbw6jDbExA0QmmrSpTh_lVn4zAjTCUGQjyS4Htc8GSMGi_Q4Ckcypo1brFY8GqTIEeJ2_Q/exec';
    let currentSheet = 'daily';

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('status').innerText = "";
        fetchData();
    }

    async function fetchData() {
        const histList = document.getElementById('history-list');
        histList.innerHTML = "<small>Updating...</small>";
        try {
            const response = await fetch(scriptURL + '?sheet=' + currentSheet);
            const data = await response.json();
            
            document.getElementById('total-in').innerText = "₹" + Number(data.totalIn).toLocaleString('en-IN');
            document.getElementById('total-out').innerText = "₹" + Number(data.totalOut).toLocaleString('en-IN');
            document.getElementById('net-balance').innerText = "₹" + Number(data.balance).toLocaleString('en-IN');
            document.getElementById('sheet-title').innerText = currentSheet.toUpperCase() + " BALANCE";

            let historyHTML = '';
            if(data.history && data.history.length > 0) {
                // Reverse takki sabse nayi entry upar dikhe
                data.history.reverse().slice(0, 7).forEach(item => {
                    let isIncome = Number(item.in) > 0;
                    let amtVal = isIncome ? "+₹" + item.in : "-₹" + item.out;
                    let amtClass = isIncome ? "hist-amt-in" : "hist-amt-out";
                    historyHTML += `
                        <div class="history-item">
                            <div class="hist-info">
                                <span class="hist-desc">${item.desc}</span>
                            </div>
                            <div class="${amtClass}">${amtVal}</div>
                        </div>`;
                });
            } else {
                historyHTML = "<small>No records found.</small>";
            }
            histList.innerHTML = historyHTML;
        } catch (e) {
            histList.innerHTML = "<small style='color:red;'>Error fetching data</small>";
        }
    }

    function sendData(type) {
        const desc = document.getElementById('desc').value;
        const amt = document.getElementById('amt').value;
        const status = document.getElementById('status');

        if(!desc || !amt) { alert("Details aur Amount bharein!"); return; }

        status.innerText = "Saving Data...";
        status.style.color = "orange";

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ targetSheet: currentSheet, description: desc, amount: amt, type: type })
        }).then(() => {
            status.innerText = "✓ Saved Successfully!";
            status.style.color = "green";
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            setTimeout(fetchData, 2000);
            setTimeout(() => { status.innerText = ""; }, 4000);
        }).catch(err => {
            status.innerText = "Error saving data!";
            status.style.color = "red";
        });
    }

    window.onload = fetchData;
</script>

</body>
</html>
