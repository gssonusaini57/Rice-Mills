<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --accent: #ffd700;
            --red: #d32f2f;
            --bg: #f0f2f5;
        }

        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--bg); color: #333; }

        /* Print Header - Website par hidden rahega */
        #print-header { 
            display: none; 
            text-align: center; 
            border-bottom: 2px solid #000; 
            padding-bottom: 15px; 
            margin-bottom: 25px; 
        }

        header { background: linear-gradient(135deg, var(--primary), #388e3c); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; }
        .refresh-btn { position: absolute; right: 15px; top: 20px; background: var(--accent); border: none; padding: 8px 15px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        .balance-card { max-width: 900px; margin: 20px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 20px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
        .balance-item div { font-size: 1.5rem; font-weight: bold; }

        .nav-menu { display: flex; justify-content: center; gap: 8px; padding: 10px; flex-wrap: wrap; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .nav-btn { background: #f8fafc; border: 1px solid #ddd; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; }

        .main-wrapper { display: flex; max-width: 1200px; margin: 20px auto; gap: 20px; padding: 0 15px; }
        .left-panel, .right-panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .left-panel { flex: 1; height: fit-content; }
        .right-panel { flex: 1.5; }

        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .history-item { display: flex; justify-content: space-between; padding: 15px; border-bottom: 1px solid #f0f0f0; }
        .date-badge { font-size: 0.75rem; background: #eee; padding: 3px 8px; border-radius: 5px; }

        #status { text-align: center; margin-top: 10px; font-weight: bold; }

        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } }

        /* Print Settings - Special Fix */
        @media print {
            header, .nav-menu, .left-panel, .refresh-btn, .btn-group { display: none !important; }
            
            #print-header { 
                display: block !important; 
                visibility: visible !important; 
                opacity: 1 !important;
            }
            
            .right-panel { width: 100% !important; border: none !important; box-shadow: none !important; }
            .balance-card { color: black !important; background: white !important; border: 1px solid black !important; }
            .balance-grid { background: none !important; color: black !important; border-top: 1px solid black !important; }
            .history-item { border-bottom: 1px solid #000 !important; page-break-inside: avoid; }
            body { background: white !important; }
        }
    </style>
</head>
<body>

<div id="print-header">
    <h1 style="font-size: 32px; margin-bottom: 5px;">KRISHNA RICE MILLS</h1>
    <p style="font-size: 18px; margin: 2px 0;">Adress: Dudhan Sadhan</p>
    <p style="font-size: 18px; margin: 2px 0;">Phone: 9478480771</p>
    <p style="text-decoration: underline; margin-top: 10px; font-weight: bold;">LEDGER STATEMENT</p>
</div>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase;">DASHBOARD</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>JAMA (IN)</span><div id="total-in">₹0.00</div></div>
        <div class="balance-item"><span>KHARCH (OUT)</span><div id="total-out">₹0.00</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>BACHAT</span><div id="net-balance">₹0.00</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Exp</button>
</div>

<div class="main-wrapper">
    <div class="left-panel">
        <h3 style="color:var(--primary);">Nayi Entry</h3>
        <input type="date" id="entryDate">
        <div id="desc-container"></div>
        <input type="number" id="amt" placeholder="Amount ₹">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status"></div>
        <button onclick="window.print()" style="width:100%; margin-top:15px; padding:12px; border-radius:10px; border:none; background:#455a64; color:white; font-weight:bold; cursor:pointer;">🖨️ Print Report</button>
    </div>

    <div class="right-panel">
        <h3 style="color:var(--primary);">Transaction History</h3>
        <div id="history-list">Loading...</div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxv66rUh1zYSMSQFIa3g-lOuvPjRReK8zhRnSdDK6NXnk1vnADVjDx4s7Ip_Wccj1LDVg/exec';
    
    window.onload = () => {
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        showSection('daily', document.querySelector('.nav-btn'));
    };

    const staffNames = ["Akash Munim", "Ashok Munim", "Akhil Foreman", "Satnaryan Rafu", "Malkeet Roti", "Kamlesh Labour", "Kaali Labour"];
    const bankNames = ["Pankaj Palish", "Shangam Enterprices", "Broken Payment", "Cash"];
    const indNames = ["Karamjeet", "Sukhwinder", "Jaswinder"];
    const expTypes = ["Electricity Bill", "Diesel", "Machine Repair", "Tea/Snacks"];

    let currentSheet = 'daily';

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const descCont = document.getElementById('desc-container');

        if(sheet === 'daily') {
            let iOpts = indNames.map(n => `<option value="${n}">${n}</option>`).join('');
            let pOpts = staffNames.map(s => `<option value="${s} (Staff)">${s}</option>`).join('');
            let bOpts = bankNames.map(b => `<option value="${b} (Bank)">${b}</option>`).join('');
            let eOpts = expTypes.map(e => `<option value="${e}">${e}</option>`).join('');
            descCont.innerHTML = `<select onchange="setDesc(this.value)"><option value="">-- Choose --</option><optgroup label="Individuals">${iOpts}</optgroup><optgroup label="Staff">${pOpts}</optgroup><optgroup label="Banks">${bOpts}</optgroup><optgroup label="Exp">${eOpts}</optgroup><option value="CUSTOM">--- Custom ---</option></select><input type="text" id="desc" placeholder="Details...">`;
        } else if(sheet === 'salary') {
            let pOpts = staffNames.map(s => `<option value="${s}">${s}</option>`).join('');
            descCont.innerHTML = `<select id="desc">${pOpts}</select>`;
        } else {
            descCont.innerHTML = `<input type="text" id="desc" placeholder="Details...">`;
        }
        fetchData();
    }

    function setDesc(val) {
        const d = document.getElementById('desc');
        if(val === "CUSTOM") { d.value = ""; d.focus(); }
        else if(val !== "") { d.value = val; }
    }

    async function fetchData() {
        const hList = document.getElementById('history-list');
        hList.innerHTML = "<small>🔄 Syncing...</small>";
        try {
            const res = await fetch(`${scriptURL}?sheet=${currentSheet}`);
            const data = await res.json();
            const fmt = (n) => "₹" + (parseFloat(n) || 0).toLocaleString('en-IN', {minimumFractionDigits: 2});
            
            document.getElementById('total-in').innerText = fmt(data.totalIn);
            document.getElementById('total-out').innerText = fmt(data.totalOut);
            document.getElementById('net-balance').innerText = fmt(data.balance);
            document.getElementById('sheet-title').innerText = currentSheet.toUpperCase();

            let hHTML = data.history.reverse().slice(0,50).map(item => {
                let cin = parseFloat(item.in) || 0;
                let cout = parseFloat(item.out) || 0;
                let d = item.date ? new Date(item.date) : new Date();
                return `<div class="history-item"><div><span class="date-badge">${d.toLocaleDateString('en-IN', {day:'2-digit', month:'short'})}</span><br><b>${item.desc}</b></div><b style="color:${cin>0?'#2e7d32':'#d32f2f'}">${cin>0?'+₹'+cin:'-₹'+cout}</b></div>`;
            }).join('');
            hList.innerHTML = hHTML || "No transactions.";
        } catch (e) { hList.innerHTML = "Error loading data."; }
    }

    function sendData(type) {
        const d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        const dt = document.getElementById('entryDate').value;
        const status = document.getElementById('status');
        if(!d || !a || !dt) return alert("Fill all details!");

        status.innerText = "⏳ Saving...";
        fetch(scriptURL, { 
            method: 'POST', 
            mode: 'no-cors', 
            body: JSON.stringify({ targetSheet: currentSheet, description: d, amount: a, type: type, customDate: dt })
        }).then(() => {
            status.innerText = "✓ Saved!";
            document.getElementById('amt').value = '';
            setTimeout(() => { fetchData(); status.innerText = ""; }, 3000);
        });
    }
</script>
</body>
</html>
