<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f4f7f4; }
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; background-color: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        
        .balance-card { max-width: 900px; margin: 15px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .balance-item span { font-size: 0.75rem; text-transform: uppercase; opacity: 0.9; }
        .balance-item div { font-size: 1.3rem; font-weight: bold; margin-top: 5px; }

        .nav-menu { display: flex; justify-content: center; gap: 10px; padding: 10px; flex-wrap: wrap; }
        .nav-btn { background: white; border: 2px solid var(--primary); padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; color: var(--primary); transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }

        .main-wrapper { display: flex; max-width: 1000px; margin: 10px auto; gap: 20px; padding: 10px; }
        .left-panel { flex: 1.2; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); height: fit-content; }
        .right-panel { flex: 1; background: #fff; padding: 20px; border-radius: 15px; box-shadow: 0 5px 20px rgba(0,0,0,0.05); max-height: 500px; overflow-y: auto; }

        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } .left-panel, .right-panel { width: 100%; box-sizing: border-box; } }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
        input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #f0f0f0; }
        .hist-amt-in { color: var(--secondary); font-weight: bold; }
        .hist-amt-out { color: var(--red); font-weight: bold; }
        
        #status { text-align: center; margin-top: 10px; font-weight: bold; font-size: 0.85rem; }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <p>Admin Dashboard</p>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase; letter-spacing:1px;">DAILY BALANCE</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>Jama (Cash In)</span><div id="total-in">₹0.00</div></div>
        <div class="balance-item"><span>Kharcha (Cash Out)</span><div id="total-out">₹0.00</div></div>
        <div class="balance-item"><span>Net Balance</span><div id="net-balance" style="color:var(--accent)">₹0.00</div></div>
    </div>
    <button onclick="fetchData()" style="background:none; border:1px solid white; color:white; border-radius:5px; margin-top:10px; padding:4px 12px; font-size:0.7rem; cursor:pointer;">⟳ Refresh Manual</button>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank Account</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff Salary</button>
    <button class="nav-btn" onclick="showSection('labour', this)">Labour Cash</button>
</div>

<div class="main-wrapper">
    <div class="left-panel">
        <h2 style="margin-top:0; color:var(--primary); font-size:1.1rem; text-align:center;">Nayi Entry Karein</h2>
        <div class="form-group">
            <label>विवरण (Details):</label>
            <input type="text" id="desc" placeholder="Details likhein...">
        </div>
        <div class="form-group">
            <label>राशि (Amount ₹):</label>
            <input type="number" id="amt" placeholder="0.00">
        </div>
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status"></div>
    </div>

    <div class="right-panel">
        <h3 style="margin:0 0 10px; font-size:1rem; color:var(--primary); border-bottom:1px solid #eee; padding-bottom:5px;">Recent History</h3>
        <div id="history-list"></div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbyZB_Pe1rAcFiZHvUF0hbVGkUTZ4YI8dELEQWemZZmJJiJyNQLaNl5uKaxzTEIpLOpCCQ/exec';
    let currentSheet = 'daily';

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        fetchData();
    }

    async function fetchData() {
        document.getElementById('status').innerText = "Loading data...";
        try {
            const response = await fetch(scriptURL + '?sheet=' + currentSheet);
            const data = await response.json();
            
            // formatting for Indian Currency
            const fmt = (val) => "₹" + parseFloat(val).toLocaleString('en-IN', {minimumFractionDigits: 2});

            document.getElementById('total-in').innerText = fmt(data.totalIn);
            document.getElementById('total-out').innerText = fmt(data.totalOut);
            document.getElementById('net-balance').innerText = fmt(data.balance);
            document.getElementById('sheet-title').innerText = currentSheet.toUpperCase() + " BALANCE";

            let hHTML = '';
            if(data.history && data.history.length > 0) {
                data.history.reverse().slice(0, 15).forEach(item => {
                    let isIn = parseFloat(item.in) > 0;
                    let val = isIn ? "+₹" + parseFloat(item.in).toLocaleString('en-IN') : "-₹" + parseFloat(item.out).toLocaleString('en-IN');
                    let cls = isIn ? "hist-amt-in" : "hist-amt-out";
                    hHTML += `<div class="history-item"><span>${item.desc}</span><span class="${cls}">${val}</span></div>`;
                });
            } else { hHTML = "<small>No records found.</small>"; }
            document.getElementById('history-list').innerHTML = hHTML;
            document.getElementById('status').innerText = "";
        } catch (e) { 
            document.getElementById('status').innerText = "Fetch Error! Check Script Settings.";
        }
    }

    function sendData(type) {
        const d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        const s = document.getElementById('status');
        if(!d || !a) { alert("Details aur Amount bharein!"); return; }

        s.innerText = "Saving...";
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ targetSheet: currentSheet, description: d, amount: a, type: type })
        }).then(() => {
            s.innerText = "✓ Saved! Updating Balance...";
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            setTimeout(fetchData, 2000);
        });
    }

    window.onload = fetchData;
</script>
</body>
</html>
