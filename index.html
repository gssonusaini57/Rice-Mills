<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --accent: #ffd700;
            --red: #d32f2f;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: #333;
        }

        header {
            background: linear-gradient(135deg, var(--primary) 0%, #388e3c 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            position: relative;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .refresh-btn {
            position: absolute;
            right: 15px;
            top: 20px;
            background: var(--accent);
            border: none;
            padding: 8px 15px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .balance-card {
            max-width: 900px;
            margin: 20px auto;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            padding: 25px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .balance-grid {
            display: flex;
            justify-content: space-around;
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 15px;
        }

        .balance-item div { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }

        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 8px;
            padding: 10px;
            flex-wrap: wrap;
            background: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        .nav-btn {
            background: #f8fafc;
            border: 1px solid #ddd;
            padding: 10px 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            transition: 0.3s;
        }

        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        .main-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 20px auto;
            gap: 20px;
            padding: 0 15px;
        }

        .left-panel, .right-panel {
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .left-panel { flex: 1; height: fit-content; }
        .right-panel { flex: 1.5; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1.5px solid #eee;
            border-radius: 10px;
            box-sizing: border-box;
            font-size: 1rem;
        }

        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .history-item {
            display: flex;
            justify-content: space-between;
            padding: 15px;
            border-bottom: 1px solid #f0f0f0;
        }

        .date-badge { font-size: 0.75rem; background: #eee; padding: 3px 8px; border-radius: 5px; color: #666; }

        #status { text-align: center; margin-top: 10px; font-weight: bold; }

        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase; border:none;">DASHBOARD</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>JAMA (IN)</span><div id="total-in">₹0.00</div></div>
        <div class="balance-item"><span>KHARCH (OUT)</span><div id="total-out">₹0.00</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>BACHAT</span><div id="net-balance">₹0.00</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Exp</button>
</div>

<div class="main-wrapper">
    <div class="left-panel">
        <h3 style="color:var(--primary);">Nayi Entry</h3>
        <input type="date" id="entryDate">
        <div id="desc-container"></div>
        <input type="number" id="amt" placeholder="Amount ₹">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status"></div>
        <button onclick="window.print()" style="width:100%; margin-top:15px; padding:10px; border-radius:10px; border:none; background:#455a64; color:white; cursor:pointer;">🖨️ Print Ledger</button>
    </div>

    <div class="right-panel">
        <h3 style="color:var(--primary);">Transaction History</h3>
        <div id="history-list">Loading...</div>
    </div>
</div>
