<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Smart Dashboard</title>
    <style>
        /* Modern Design Variables */
        :root {
            --primary: #1b5e20;
            --secondary: #2e7d32;
            --accent: #ffd700;
            --red: #d32f2f;
            --bg: #f0f2f5;
            --card-bg: #ffffff;
            --shadow: 0 8px 30px rgba(0,0,0,0.12);
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            background-color: var(--bg);
            color: #333;
            line-height: 1.6;
        }

        /* Header with Gradient */
        header {
            background: linear-gradient(135deg, var(--primary) 0%, #388e3c 100%);
            color: white;
            padding: 20px;
            text-align: center;
            border-bottom: 4px solid var(--accent);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        header h1 { margin: 0; font-size: 1.8rem; letter-spacing: 1px; }

        .refresh-btn {
            position: absolute;
            right: 20px;
            top: 22px;
            background: var(--accent);
            border: none;
            padding: 10px 18px;
            border-radius: 50px;
            font-weight: bold;
            color: var(--primary);
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .refresh-btn:hover { transform: rotate(15deg) scale(1.05); background: white; }

        /* Premium Balance Card */
        .balance-card {
            max-width: 950px;
            margin: 20px auto;
            background: linear-gradient(135deg, #1b5e20 0%, #2e7d32 100%);
            color: white;
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(27, 94, 32, 0.3);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .balance-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(5px);
        }

        .balance-item span { font-size: 0.9rem; opacity: 0.9; font-weight: 500; }
        .balance-item div { font-size: 1.6rem; font-weight: 800; margin-top: 5px; }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            position: sticky;
            top: 85px;
            background: rgba(240, 242, 245, 0.9);
            backdrop-filter: blur(10px);
            z-index: 999;
        }

        .nav-btn {
            background: white;
            border: none;
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            color: var(--primary);
            transition: 0.3s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .nav-btn:hover { background: #e8f5e9; transform: translateY(-2px); }
        .nav-btn.active { background: var(--primary); color: white; box-shadow: 0 6px 15px rgba(27, 94, 32, 0.3); }

        /* Main Layout */
        .main-wrapper {
            display: flex;
            max-width: 1200px;
            margin: 0 auto 40px;
            gap: 25px;
            padding: 0 20px;
        }

        .left-panel, .right-panel {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 20px;
            box-shadow: var(--shadow);
        }

        .left-panel { flex: 1; height: fit-content; position: sticky; top: 160px; }
        .right-panel { flex: 1.4; min-height: 500px; }

        h3 { color: var(--primary); margin-top: 0; border-left: 5px solid var(--accent); padding-left: 10px; }

        /* Form Design */
        label { font-size: 0.85rem; font-weight: bold; color: #555; display: block; margin-bottom: 8px; margin-top: 15px; }
        select, input {
            width: 100%;
            padding: 14px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 1rem;
            box-sizing: border-box;
            background: #f8fafc;
            transition: 0.3s;
        }
        select:focus, input:focus { border-color: var(--secondary); background: white; outline: none; box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1); }

        .btn-group { display: flex; gap: 15px; margin-top: 25px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 16px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 1rem; }
