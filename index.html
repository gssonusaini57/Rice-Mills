<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KRM Ledger Pro 2026 | Krishan Rice Mills</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; }
        
        /* Connection Test Button */
        .test-btn { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.2); border: 1px solid white; color: white; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; z-index: 1001; }
        .test-btn:hover { background: white; color: var(--primary); }

        .nav-menu { display: flex; justify-content: center; gap: 5px; padding: 10px; background: white; position: sticky; top: 0; z-index: 1000; box-shadow: 0 2px 5px rgba(0,0,0,0.1); flex-wrap: wrap; }
        .nav-btn { background: #f8fafc; border: 1px solid #ddd; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--primary); font-size: 0.8rem; }
        .nav-btn.active { background: var(--primary); color: white; }

        .balance-card { max-width: 950px; margin: 15px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 15px; border-radius: 15px; text-align: center; }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 10px; }
        .bal-val { font-size: 1.2rem; font-weight: bold; display: block; color: var(--accent); }

        .main-wrapper { display: flex; max-width: 1300px; margin: 10px auto; gap: 20px; padding: 0 15px; }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #input-panel { flex: 0 0 330px; height: fit-content; }
        #display-panel { flex: 1; }

        .debug-box { display: none; background: #fffde7; border: 1px solid #ffd54f; padding: 10px; margin: 10px auto; max-width: 950px; border-radius: 10px; font-size: 0.8rem; text-align: center; }

        input, select { width: 100%; padding: 10px; margin-bottom: 10px; border: 1.5px solid #eee; border-radius: 8px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 12px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.85rem; }
        .total-row { background: #f1f8e9; font-weight: bold; border-top: 2px solid var(--primary); }

        @media print { .nav-menu, #input-panel, #filter-area, .test-btn { display: none !important; } .main-wrapper { display: block; } }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button class="test-btn" onclick="runConnectionTest()">Test Link</button>
</header>

<div id="debugBox" class="debug-box"></div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Exp</button>
    <button class="nav-btn" onclick="showSection('ashok_depo', this)">👤 Ashok Depo</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn" onclick="showSection('depo_exp', this)">Depo Exp</button>
    <button class="nav-btn" onclick="showSection('truck_rent', this)">Truck Rent</button>
    <button class="nav-btn" style="background:#ff9800; color:white;" onclick="showReports(this)">📊 REPORTS</button>
</div>

<div class="balance-card">
    <h3 id="dash-title" style="margin:0;">DAILY LEDGER</h3>
    <div class="balance-grid">
        <div>TOTAL IN (+)<span class="bal-val" id="total-in">₹0</span></div>
        <div>TOTAL OUT (-)<span class="bal-val" id="total-out">₹0</span></div>
        <div>NET BALANCE<span class="bal-val" id="net-balance">₹0</span></div>
    </div>
</div>

<div class="main-wrapper">
    <div id="input-panel" class="panel">
        <h3>Nayi Entry</h3>
        <input type="date" id="entryDate">
        <div id="selector-container"></div>
        <input type="text" id="desc" placeholder="Details..." onkeyup="checkShortcuts(this.value)">
        <input type="number" id="amt" placeholder="Amount ₹">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
    </div>

    <div id="display-panel" class="panel">
        <div id="filter-area" class="filter-box" style="background:#e8f5e9; padding:12px; border-radius:12px; margin-bottom:15px;">
            <div style="display: flex; gap: 8px; align-items: center; flex-wrap: wrap;">
                <input type="date" id="startDate" style="width:130px; margin:0;">
                <span>to</span>
                <input type="date" id="endDate" style="width:130px; margin:0;">
                <button onclick="filterByRange()" class="nav-btn" style="background:var(--primary); color:white;">Filter</button>
                <button onclick="downloadPDF()" class="nav-btn" style="background:#f44336; color:white;">📄 PDF</button>
                <button onclick="window.print()" class="nav-btn">🖨️ Print</button>
                <button onclick="fetchData()" class="nav-btn">Reset</button>
            </div>
        </div>

        <div id="pdf-content">
            <h2 id="print-title" style="display:none; text-align:center;">KRISHAN RICE MILLS</h2>
            <div style="max-height: 550px; overflow-y: auto;">
                <table id="mainTable">
                    <thead id="table-head"></thead>
                    <tbody id="list-body"></tbody>
                    <tfoot id="table-foot"></tfoot>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxkf5HBf6RE-4u62T1zMBpTugtBiFBotM_7N16rZ2Xl3og13x64L76aUBAu97mK-hVSnQ/exec';
    let currentSheet = 'daily';
    let masterData = [];

    window.onload = () => {
        const today = new Date().toISOString().split('T')[0];
        document.getElementById('entryDate').value = today;
        document.getElementById('startDate').value = today;
        document.getElementById('endDate').value = today;
        showSection('daily', document.querySelector('.nav-btn'));
    };

    async function runConnectionTest() {
        const debug = document.getElementById('debugBox');
        debug.style.display = 'block';
        debug.innerHTML = "🔄 Testing Cloud Link...";
        try {
            const res = await fetch(`${scriptURL}?sheet=daily&t=${new Date().getTime()}`);
            const data = await res.json();
            if(data.history) {
                debug.innerHTML = "<span style='color:green'>✅ Connection Active! Ledger is online.</span>";
                setTimeout(() => { debug.style.display = 'none'; }, 4000);
            }
        } catch (e) {
            debug.innerHTML = "<span style='color:red'>❌ Link Error! Check 'Anyone' access in Google Script.</span>";
        }
    }

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.getElementById('input-panel').style.display = 'block';
        document.getElementById('filter-area').style.display = 'block';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('dash-title').innerText = sheet.toUpperCase().replace('_', ' ') + " Ledger";
        renderSelector(sheet);
        fetchData();
    }

    function renderSelector(sheet) {
        const container = document.getElementById('selector-container');
        let options = '<option value="">-- Manual Entry --</option>';
        if(sheet === 'daily') {
            options += `
                <option value="Expenditure (exp)">💸 Expenditure</option>
                <option value="Ashok (ad)">👤 Ashok Depo</option>
                <option value="Bank (bk)">💰 Bank Entry</option>
                <option value="Staff (st)">👥 Staff Salary</option>
                <option value="Karamjeet">👤 Karamjeet</option>
                <option value="Sukhwinder">👤 Sukhwinder</option>
                <option value="Jaswinder">👤 Jaswinder</option>
                <option value="Truck (tr)">🚚 Truck Rent</option>`;
        }
        container.innerHTML = `<select id="nameSelector">${options}</select>`;
    }

    function checkShortcuts(val) {
        const s = document.getElementById('nameSelector');
        const v = val.toLowerCase();
        if(v === 'ad') s.value = "Ashok (ad)";
        if(v === 'bk') s.value = "Bank (bk)";
        if(v === 'st') s.value = "Staff (st)";
        if(v === 'ex') s.value = "Expenditure (exp)";
    }

    async function fetchData() {
        const body = document.getElementById('list-body');
        document.getElementById('table-head').innerHTML = `<tr><th>Date</th><th>Description</th><th>In (₹)</th><th>Out (₹)</th></tr>`;
        body.innerHTML = "<tr><td colspan='4'>🔄 Syncing Data...</td></tr>";
        try {
            const res = await fetch(`${scriptURL}?sheet=${currentSheet}&t=${new Date().getTime()}`);
            const data = await res.json();
            const tin = parseFloat(data.totalIn) || 0;
            const tout = parseFloat(data.totalOut) || 0;
            document.getElementById('total-in').innerText = "₹" + tin.toLocaleString();
            document.getElementById('total-out').innerText = "₹" + tout.toLocaleString();
            document.getElementById('net-balance').innerText = "₹" + (tin - tout).toLocaleString();
            masterData = (data.history || []).reverse();
            renderTable(masterData);
        } catch (e) { body.innerHTML = "<tr><td colspan='4'>❌ Connection Failed</td></tr>"; }
    }

    function renderTable(rows) {
        const body = document.getElementById('list-body');
        let sIn = 0, sOut = 0;
        body.innerHTML = rows.map(i => {
            const vIn = parseFloat(i.in) || 0;
            const vOut = parseFloat(i.out) || 0;
            sIn += vIn; sOut += vOut;
            return `<tr><td>${new Date(i.date).toLocaleDateString('en-IN')}</td><td>${i.desc}</td><td style="color:green">₹${vIn || '-'}</td><td style="color:red">₹${vOut || '-'}</td></tr>`;
        }).join('');
        document.getElementById('table-foot').innerHTML = `<tr class="total-row"><td colspan="2">TOTAL</td><td>₹${sIn.toLocaleString()}</td><td>₹${sOut.toLocaleString()}</td></tr>`;
    }

    async function showReports(btn) {
        document.getElementById('input-panel').style.display = 'none';
        document.getElementById('filter-area').style.display = 'none';
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        document.getElementById('dash-title').innerText = "MONTHLY SUMMARY";
        const body = document.getElementById('list-body');
        document.getElementById('table-head').innerHTML = `<tr><th>Month</th><th>Opening</th><th>In (+)</th><th>Out (-)</th><th>Closing</th></tr>`;
        body.innerHTML = "<tr><td colspan='5'>🔄 Generating Reports...</td></tr>";
        try {
            const res = await fetch(`${scriptURL}?action=getReports`);
            const data = await res.json();
            body.innerHTML = Object.keys(data.monthly).reverse().map(m => {
                const r = data.monthly[m];
                return `<tr><td><b>${m}</b></td><td>₹${r.opening.toLocaleString()}</td><td style="color:green">₹${r.in.toLocaleString()}</td><td style="color:red">₹${r.out.toLocaleString()}</td><td style="font-weight:bold">₹${r.closing.toLocaleString()}</td></tr>`;
            }).join('');
            document.getElementById('table-foot').innerHTML = "";
        } catch (e) { body.innerHTML = "<tr><td colspan='5' style='color:red'>No Report Data Found.</td></tr>"; }
    }

    function filterByRange() {
        const start = new Date(document.getElementById('startDate').value);
        const end = new Date(document.getElementById('endDate').value);
        const filtered = masterData.filter(row => {
            const rowDate = new Date(row.date);
            return rowDate >= start && rowDate <= end;
        });
        renderTable(filtered);
    }

    function downloadPDF() {
        const element = document.getElementById('pdf-content');
        document.getElementById('print-title').style.display = 'block';
        const opt = { margin: 0.5, filename: currentSheet + '_report.pdf', html2canvas: { scale: 2 }, jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' } };
        html2pdf().from(element).set(opt).save().then(() => { document.getElementById('print-title').style.display = 'none'; });
    }

    function sendData(type) {
        const n = document.getElementById('nameSelector').value;
        const d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        if(!d || !a) return alert("Details bharein!");
        document.getElementById('status').innerText = "⏳ Saving...";
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ targetSheet: currentSheet, description: n ? `${n}: ${d}` : d, amount: a, type: type, customDate: document.getElementById('entryDate').value })})
        .then(() => { location.reload(); });
    }
</script>
</body>
</html>
