<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f4f7f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .balance-card { max-width: 900px; margin: 15px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.2); padding-top: 15px; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; padding: 10px; flex-wrap: wrap; }
        .nav-btn { background: white; border: 2px solid var(--primary); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-wrapper { display: flex; max-width: 1100px; margin: auto; gap: 20px; padding: 10px; }
        .left-panel, .right-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .left-panel { flex: 1; } .right-panel { flex: 1.2; max-height: 700px; overflow-y: auto; }
        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .history-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .print-btn { background: #555; color: white; padding: 10px; border: none; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

<header><h1>KRISHAN RICE MILLS</h1></header>

<div class="balance-card">
    <h3 id="sheet-title">DAILY CASH</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>Jama (In)</span><div id="total-in">₹0</div></div>
        <div class="balance-item"><span>Kharcha (Out)</span><div id="total-out">₹0</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>Net Balance</span><div id="net-balance">₹0</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank Account</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff Salary</button>
    <button class="nav-btn" onclick="showSection('labour', this)">Labour Cash</button>
</div>

<div class="main-wrapper">
    <div class="left-panel">
        <h3 style="color:var(--primary)">Nayi Entry</h3>
        <div id="desc-container"></div>
        <input type="number" id="amt" placeholder="Amount ₹">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
        
        <div id="filter-section" style="margin-top:20px; border-top:2px solid #eee; padding-top:15px; display:none;">
            <select id="staffFilter" onchange="fetchData()"></select>
            <button class="print-btn" onclick="window.print()">🖨️ Print Personal Report</button>
        </div>
    </div>

    <div class="right-panel">
        <h3 style="color:var(--primary)">Recent History</h3>
        <div id="history-list"></div>
    </div>
</div>

<script>
    // APNA NAYA SCRIPT URL YAHAN DALEIN
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwkv7kuuBubNTelznhE_N2bsazQg3FMBTHB1juuR7ibdZurVx4bnEn9RU69mXS53aQduA/exec';
    
    const staffNames = ["Akash Munim", "Ashok Munim", "Akhil Foreman", "Satnaryan Rafu", "Malkeet Roti", "Kamlesh Labour", "Kaali Labour"];
    const bankNames = ["Pankaj Palish", "Shangam Enterprices", "Broken Payment", "Karamjeet", "Jaswinder", "Sukhwinder", "Cash", "Other"];

    let currentSheet = 'daily';

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const descCont = document.getElementById('desc-container');
        const filterSec = document.getElementById('filter-section');

        if(sheet === 'daily') {
            let opts = staffNames.map(s => `<option value="${s} Deposit">${s}</option>`).join('');
            descCont.innerHTML = `<select onchange="setDailyDesc(this.value)"><option value="">Select Partner (Optional)</option>${opts}<option value="Other">Other</option></select><input type="text" id="desc" placeholder="Details...">`;
            filterSec.style.display = 'none';
        } else if(sheet === 'salary') {
            let opts = staffNames.map(s => `<option value="${s}">${s}</option>`).join('');
            descCont.innerHTML = `<select id="desc">${opts}</select>`;
            filterSec.style.display = 'block';
            document.getElementById('staffFilter').innerHTML = `<option value="All">All Staff</option>` + opts;
        } else if(sheet === 'bank') {
            let opts = bankNames.map(b => `<option value="${b}">${b}</option>`).join('');
            descCont.innerHTML = `<select id="desc" onchange="checkOther(this.value)">${opts}</select><div id="other-box" style="display:none;"><input type="text" id="other-desc" placeholder="Detail..."></div>`;
            filterSec.style.display = 'none';
        } else {
            descCont.innerHTML = `<input type="text" id="desc" placeholder="Details...">`;
            filterSec.style.display = 'none';
        }
        fetchData();
    }

    function setDailyDesc(val) { if(val !== "Other" && val !== "") document.getElementById('desc').value = val; }
    function checkOther(val) { document.getElementById('other-box').style.display = (val === 'Other') ? 'block' : 'none'; }

    async function fetchData() {
        let staff = (currentSheet === 'salary') ? document.getElementById('staffFilter').value : "All";
        try {
            const response = await fetch(`${scriptURL}?sheet=${currentSheet}&staff=${staff}`);
            const data = await response.json();
            document.getElementById('total-in').innerText = "₹" + Number(data.totalIn).toLocaleString('en-IN');
            document.getElementById('total-out').innerText = "₹" + Number(data.totalOut).toLocaleString('en-IN');
            document.getElementById('net-balance').innerText = "₹" + Number(data.balance).toLocaleString('en-IN');
            document.getElementById('sheet-title').innerText = (staff !== "All") ? staff + " Ledger" : currentSheet.toUpperCase();

            let hHTML = data.history.reverse().slice(0,25).map(item => {
                let cls = item.in > 0 ? "color:green" : "color:red";
                return `<div class="history-item"><span>${item.desc}</span><b style="${cls}">${item.in > 0 ? '+₹'+item.in : '-₹'+item.out}</b></div>`;
            }).join('');
            document.getElementById('history-list').innerHTML = hHTML || "No records.";
        } catch (e) { console.error(e); }
    }

    function sendData(type) {
        let d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        if(currentSheet === 'bank' && d === 'Other') d = document.getElementById('other-desc').value;
        if(!d || !a) return alert("Fill data!");

        document.getElementById('status').innerText = "Saving...";
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ targetSheet: currentSheet, description: d, amount: a, type: type })
        }).then(() => {
            document.getElementById('status').innerText = "✓ Saved!";
            document.getElementById('amt').value = '';
            setTimeout(fetchData, 1500);
        });
    }

    window.onload = () => showSection('daily', document.querySelector('.nav-btn'));
</script>
</body>
</html>
