<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Management</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f4f7f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; }
        .refresh-btn { position: absolute; right: 15px; top: 15px; background: var(--accent); border: none; padding: 8px 12px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        .balance-card { max-width: 900px; margin: 15px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .nav-menu { display: flex; justify-content: center; gap: 5px; padding: 10px; flex-wrap: wrap; }
        .nav-btn { background: white; border: 1.5px solid var(--primary); padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: bold; color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-wrapper { display: flex; max-width: 1200px; margin: auto; gap: 20px; padding: 10px; }
        .left-panel, .right-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .left-panel { flex: 1; height: fit-content; } .right-panel { flex: 1.2; max-height: 800px; overflow-y: auto; }
        label { font-size: 0.85rem; font-weight: bold; color: var(--primary); display: block; margin-bottom: 5px; }
        select, input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .history-item { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #eee; }
        .date-badge { font-size: 0.7rem; color: #777; font-weight: bold; background: #eee; padding: 2px 6px; border-radius: 4px; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
        @media print { .nav-menu, .left-panel, header, .refresh-btn { display: none !important; } .right-panel { width: 100%; } }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase;">DASHBOARD</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>Jama (In)</span><div id="total-in">₹0.00</div></div>
        <div class="balance-item"><span>Kharch (Out)</span><div id="total-out">₹0.00</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>Net Bachat</span><div id="net-balance">₹0.00</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Exp</button>
</div>

<div class="main-wrapper">
    <div class="left-panel">
        <h3 style="color:var(--primary); margin-top:0;">Nayi Entry</h3>
        <label>Tareekh:</label>
        <input type="date" id="entryDate">
        <label>Details:</label>
        <div id="desc-container"></div>
        <label>Amount (₹):</label>
        <input type="number" id="amt" placeholder="0.00">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status"></div>
        <div id="print-area" style="margin-top:20px; display:none;">
            <button onclick="window.print()" style="width:100%; padding:10px; border-radius:10px; background:#555; color:white; border:none; cursor:pointer; font-weight:bold;">🖨️ Print Ledger Report</button>
        </div>
    </div>

    <div class="right-panel">
        <h3 style="color:var(--primary); margin:0 0 10px; border-bottom:1px solid #eee;">Transaction History</h3>
        <div id="history-list">Loading...</div>
    </div>
</div>

<script>
    // 1. APNA NAYA URL YAHAN DALEIN
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwiLzIquSO8kn5zwx3rFdB3FN-4OcrD0o1mt3GYiLiLrnP5I-3eptbrjo63z9VY130OFg/exec';
    
    // ... baaki puraana code ...

    async function fetchData() {
        const hList = document.getElementById('history-list');
        // Loading dikhayein
        hList.innerHTML = "<div style='text-align:center; padding:20px;'><small>🔄 Data dhoond raha hoon...</small></div>";
        
        try {
            // Hum ek timeout timer laga rahe hain taaki agar net slow ho toh website wait kare
            const controller = new AbortController();
            const id = setTimeout(() => controller.abort(), 10000); // 10 sec wait

            const res = await fetch(`${scriptURL}?sheet=${currentSheet}`, { signal: controller.signal });
            clearTimeout(id);

            const data = await res.json();
            
            // Numbers ko Indian Format mein badalna
            const fmt = (n) => "₹" + (parseFloat(n) || 0).toLocaleString('en-IN', {minimumFractionDigits: 2});
            
            document.getElementById('total-in').innerText = fmt(data.totalIn);
            document.getElementById('total-out').innerText = fmt(data.totalOut);
            document.getElementById('net-balance').innerText = fmt(data.balance);
            document.getElementById('sheet-title').innerText = currentSheet.toUpperCase();

            if (!data.history || data.history.length === 0) {
                hList.innerHTML = "<p style='text-align:center; padding:20px; color:#999;'>Abhi koi entry nahi mili.</p>";
                return;
            }

            let hHTML = data.history.reverse().slice(0,50).map(item => {
                let cin = parseFloat(item.in) || 0;
                let cout = parseFloat(item.out) || 0;
                let d = item.date ? new Date(item.date) : new Date();
                return `<div class="history-item"><div><span class="date-badge">${d.toLocaleDateString('en-IN', {day:'2-digit', month:'short'})}</span><br><b>${item.desc || 'No Detail'}</b></div><b style="color:${cin>0?'green':'red'}">${cin>0?'+₹'+cin:'-₹'+cout}</b></div>`;
            }).join('');
            hList.innerHTML = hHTML;

        } catch (e) { 
            console.error(e);
            hList.innerHTML = `
                <div style='color:red; text-align:center; padding:20px;'>
                    <b>Opps! Data nahi mila.</b><br>
                    <small>1. Apps Script mein 'Anyone' access check karein.<br>
                    2. Google Sheet ke tab ka naam sahi karein.</small>
                </div>`;
        }
    }
</script>
</body>
</html>
