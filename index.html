<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Master Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: linear-gradient(135deg, var(--primary), #388e3c); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); }
        .nav-menu { display: flex; justify-content: center; gap: 6px; padding: 10px; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .nav-btn { background: #f8fafc; border: 1px solid #ddd; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 600; color: var(--primary); font-size: 0.85rem; transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; }
        .main-wrapper { display: flex; max-width: 1300px; margin: 15px auto; gap: 20px; padding: 0 15px; }
        .panel { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #input-panel { flex: 0 0 340px; height: fit-content; }
        #display-panel { flex: 1; }
        
        /* Help Guide Box */
        .help-guide { background: #fffde7; border: 1px dashed #fbc02d; padding: 12px; border-radius: 12px; margin-bottom: 15px; font-size: 0.8rem; line-height: 1.4; }
        .shortcut-badge { background: #eee; padding: 1px 5px; border-radius: 4px; font-weight: bold; border: 1px solid #ccc; color: #333; }

        label { font-weight: bold; font-size: 0.85rem; color: var(--primary); display: block; margin-bottom: 4px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 0.95rem; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        th { background: #f4f7f4; color: var(--primary); position: sticky; top: 0; }
        @media (max-width: 900px) { .main-wrapper { flex-direction: column; } #input-panel { width: 100%; } }
    </style>
</head>
<body>

<header><h1>KRISHAN RICE MILLS</h1></header>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Exp</button>
    <button class="nav-btn" onclick="showSection('depo_exp', this)">🏢 Depo Exp</button>
    <button class="nav-btn" onclick="showSection('truck_rent', this)">🚚 Truck Rent</button>
    <button class="nav-btn" onclick="showSection('ashok_depo', this)">👤 Ashok Depo</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn" style="background:#ff9800; color:white;" onclick="showSection('reports', this)">📊 REPORTS</button>
</div>

<div class="main-wrapper">
    <div id="input-panel" class="panel">
        <div class="help-guide">
            <strong>🚀 Shortcuts (Daily Cash mein):</strong><br>
            Peeche space dekar likhein:<br>
            <span class="shortcut-badge">bk</span> Bank | <span class="shortcut-badge">st</span> Staff | <span class="shortcut-badge">tr</span> Truck | <span class="shortcut-badge">dp</span> Depo | <span class="shortcut-badge">ad</span> Ashok
        </div>

        <h3>Nayi Entry</h3>
        <label>Date:</label>
        <input type="date" id="entryDate">
        
        <label>Select Name/Account:</label>
        <div id="selector-container"></div>
        
        <label>Manual Description:</label>
        <input type="text" id="desc" placeholder="Details (Shortcuts use karein)...">
        
        <label>Amount (₹):</label>
        <input type="number" id="amt" placeholder="0.00">
        
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold; color: var(--secondary);"></div>
    </div>

    <div id="display-panel" class="panel">
        <input type="text" id="searchInput" style="width:100%; padding:12px; margin-bottom:15px; border:1px solid #ddd; border-radius:10px;" placeholder="Search history..." onkeyup="filterTable()">
        <div style="max-height: 550px; overflow-y: auto;">
            <table id="mainTable">
                <thead><tr><th>Date</th><th>Description</th><th>In</th><th>Out</th></tr></thead>
                <tbody id="list-body"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxsY6hdkTgbMINDstquDC2nYdoqFGPT9R5auJxZe6_gLyLnNKttciiEMc9ae_-w/exec';
    let currentSheet = 'daily';
    let masterData = [];

    const partners = ["Karamjeet", "Sukhwinder", "Jaswinder"];
    const staffNames = ["Akash Munim", "Ashok Munim", "Akhil Foreman", "Malkeet Roti", "Kaali Labour", "Kamlesh Labour", "Satnaryan Rafu"];
    const bankParties = ["Pankaj Palish", "Shangam Enterprices", "Cash Deposit", "Cash Withdraw"];

    window.onload = () => {
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        showSection('daily', document.querySelector('.nav-btn'));
    };

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        renderSelector(sheet);
        if(sheet === 'reports') fetchReports(); else fetchData();
    }

    function renderSelector(sheet) {
        const container = document.getElementById('selector-container');
        let options = '<option value="">-- Manual Entry --</option>';
        if(sheet === 'daily') {
            options += `<optgroup label="Bank Parties">${bankParties.map(n => `<option value="${n} (bank)">${n}</option>`).join('')}</optgroup>`;
            options += `<optgroup label="Staff Salary">${staffNames.map(n => `<option value="${n} (staff)">${n}</option>`).join('')}</optgroup>`;
            options += `<optgroup label="Partners">${partners.map(n => `<option value="${n}">${n}</option>`).join('')}</optgroup>`;
            options += `<optgroup label="Routing"><option value="Depo (depo exp)">🏢 Depo Exp</option><option value="Truck (truck)">🚚 Truck Rent</option><option value="Ashok (ashok depo)">👤 Ashok Depo</option></optgroup>`;
        } else if(sheet === 'bank') {
            options += bankParties.map(n => `<option value="${n}">${n}</option>`).join('');
        } else if(sheet === 'salary') {
            options += staffNames.map(n => `<option value="${n}">${n}</option>`).join('');
        }
        container.innerHTML = `<select id="nameSelector" onchange="document.getElementById('desc').focus()">${options}</select>`;
    }

    async function fetchData() {
        document.getElementById('input-panel').style.display = 'block';
        const body = document.getElementById('list-body');
        body.innerHTML = "<tr><td colspan='4' style='text-align:center;'>🔄 Syncing...</td></tr>";
        try {
            const res = await fetch(`${scriptURL}?sheet=${currentSheet}&t=${new Date().getTime()}`);
            const data = await res.json();
            masterData = data.history.reverse();
            renderTable(masterData);
        } catch (e) { body.innerHTML = "Error loading data."; }
    }

    function renderTable(dataRows) {
        const body = document.getElementById('list-body');
        body.innerHTML = dataRows.map(i => `<tr>
            <td>${new Date(i.date).toLocaleDateString('en-IN')}</td>
            <td>${i.desc}</td>
            <td style="color:green; font-weight:bold;">${i.in > 0 ? '₹'+i.in : '-'}</td>
            <td style="color:red; font-weight:bold;">${i.out > 0 ? '₹'+i.out : '-'}</td>
        </tr>`).join('');
    }

    async function fetchReports() {
        document.getElementById('input-panel').style.display = 'none';
        const body = document.getElementById('list-body');
        body.innerHTML = "🔄 Calculating Reports...";
        try {
            const res = await fetch(`${scriptURL}?action=getReports`);
            const data = await res.json();
            body.innerHTML = Object.keys(data.monthly).map(m => {
                let r = data.monthly[m];
                return `<tr><td><b>${m}</b></td><td>₹${Number(r.opening).toLocaleString()}</td><td style="color:green">+₹${Number(r.in).toLocaleString()}</td><td style="color:red">-₹${Number(r.out).toLocaleString()}</td><td><b>₹${Number(r.closing).toLocaleString()}</b></td></tr>`;
            }).join('');
        } catch(e) { body.innerHTML = "Error loading reports."; }
    }

    function sendData(type) {
        const name = document.getElementById('nameSelector').value;
        const customDesc = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        const dt = document.getElementById('entryDate').value;
        const finalDesc = name && customDesc ? `${name}: ${customDesc}` : (name || customDesc);
        
        if(!finalDesc || !a) return alert("Details bharein!");
        
        document.getElementById('status').innerText = "⏳ Saving...";
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ targetSheet: currentSheet, description: finalDesc, amount: a, type: type, customDate: dt })})
        .then(() => {
            document.getElementById('status').innerText = "✓ Saved!";
            document.getElementById('desc').value = '';
            document.getElementById('amt').value = '';
            setTimeout(() => { fetchData(); document.getElementById('status').innerText = ""; }, 1500);
        });
    }

    function filterTable() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const filtered = masterData.filter(row => row.desc.toLowerCase().includes(query));
        renderTable(filtered);
    }
</script>
</body>
</html>
