<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Dashboard</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f4f7f4; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); }
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; }
        
        /* Naya Refresh Button Style */
        .refresh-btn { 
            position: absolute; right: 20px; top: 20px; 
            background: var(--accent); color: #000; border: none; 
            padding: 10px 15px; border-radius: 50px; font-weight: bold; 
            cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            transition: 0.3s;
        }
        .refresh-btn:hover { transform: rotate(180deg); background: white; }

        .balance-card { max-width: 900px; margin: 15px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 20px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 15px; }
        .balance-item div { font-size: 1.4rem; font-weight: bold; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; padding: 10px; flex-wrap: wrap; }
        .nav-btn { background: white; border: 2px solid var(--primary); padding: 10px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: var(--primary); }
        .nav-btn.active { background: var(--primary); color: white; }
        
        .main-wrapper { display: flex; max-width: 1100px; margin: auto; gap: 20px; padding: 10px; }
        .left-panel, .right-panel { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .left-panel { flex: 1; height: fit-content; } .right-panel { flex: 1.2; max-height: 700px; overflow-y: auto; }
        
        @media (max-width: 768px) { .main-wrapper { flex-direction: column; } .refresh-btn { top: 10px; right: 10px; padding: 5px 10px; font-size: 0.8rem; } }
        
        select, input { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 10px; margin-bottom: 12px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .history-item { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid #eee; }
        #status { text-align: center; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button class="refresh-btn" onclick="fetchData()">🔄 Refresh</button>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase;">DAILY CASH</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>Jama (In)</span><div id="total-in">₹0.00</div></div>
        <div class="balance-item"><span>Kharch (Out)</span><div id="total-out">₹0.00</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>Bachat</span><div id="net-balance">₹0.00</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank Account</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff/Partner</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Expenditures</button>
</div>

<div class="main-wrapper">
    <div class="left-panel">
        <h3 style="color:var(--primary); margin-top:0;">Nayi Entry</h3>
        <div id="desc-container"></div>
        <input type="number" id="amt" placeholder="Amount ₹">
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status"></div>
        
        <div id="filter-section" style="margin-top:20px; border-top:2px solid #eee; padding-top:15px; display:none;">
            <select id="staffFilter" onchange="fetchData()"></select>
            <button onclick="window.print()" style="width:100%; padding:10px; border-radius:10px; background:#555; color:white; border:none; cursor:pointer; font-weight:bold;">🖨️ Print Report</button>
        </div>
    </div>

    <div class="right-panel">
        <div style="display:flex; justify-content:space-between; align-items:center; border-bottom:1px solid #eee; margin-bottom:10px;">
            <h3 style="color:var(--primary); margin:0;">History</h3>
            <small style="cursor:pointer; color:var(--secondary); font-weight:bold;" onclick="fetchData()">Click to Reload ↻</small>
        </div>
        <div id="history-list">Loading...</div>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbzK2pr9dAfAVnSJG-mQ6tEXRlh_KzfADz-DQXjUJtdinX1K3CuCAyI4s1kG_lcxWP6rVg/exec';
    
    const staffNames = ["Akash Munim", "Ashok Munim", "Akhil Foreman", "Satnaryan Rafu", "Malkeet Roti", "Kamlesh Labour", "Kaali Labour"];
    const bankNames = ["Pankaj Palish", "Shangam Enterprices", "Broken Payment", "Karamjeet", "Jaswinder", "Sukhwinder", "Cash", "Other"];
    const expTypes = ["Electricity Bill", "Diesel", "Machine Repair", "Tea/Snacks", "Stationery", "Other (Exp)"];

    let currentSheet = 'daily';

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        
        const descCont = document.getElementById('desc-container');
        const filterSec = document.getElementById('filter-section');

        if(sheet === 'daily') {
            let pOpts = staffNames.map(s => `<option value="${s} (Partner)">${s}</option>`).join('');
            let bOpts = bankNames.map(b => `<option value="${b} (Bank)">${b}</option>`).join('');
            let eOpts = expTypes.map(e => `<option value="${e}">${e}</option>`).join('');
            
            descCont.innerHTML = `
                <select onchange="setDesc(this.value)" style="background:#e3f2fd;">
                    <option value="">-- Quick Select --</option>
                    <optgroup label="Expenditures (Kharche)">${eOpts}</optgroup>
                    <optgroup label="Partners/Staff">${pOpts}</optgroup>
                    <optgroup label="Banks">${bOpts}</optgroup>
                </select>
                <input type="text" id="desc" placeholder="Details...">`;
            filterSec.style.display = 'none';
        } else if(sheet === 'salary') {
            let opts = staffNames.map(s => `<option value="${s}">${s}</option>`).join('');
            descCont.innerHTML = `<select id="desc">${opts}</select>`;
            filterSec.style.display = 'block';
            document.getElementById('staffFilter').innerHTML = `<option value="All">All Staff</option>` + opts;
        } else if(sheet === 'bank') {
            let opts = bankNames.map(b => `<option value="${b}">${b}</option>`).join('');
            descCont.innerHTML = `<select id="desc" onchange="checkOther(this.value)">${opts}</select><div id="other-box" style="display:none;"><input type="text" id="other-desc" placeholder="Bank Detail..."></div>`;
            filterSec.style.display = 'none';
        } else {
            descCont.innerHTML = `<input type="text" id="desc" placeholder="Details...">`;
            filterSec.style.display = 'none';
        }
        fetchData();
    }

    function setDesc(val) { if(val !== "") document.getElementById('desc').value = val; }

    async function fetchData() {
        let staff = (currentSheet === 'salary') ? document.getElementById('staffFilter').value : "All";
        const hList = document.getElementById('history-list');
        hList.innerHTML = "<small>Refreshing latest data...</small>";

        try {
            const response = await fetch(`${scriptURL}?sheet=${currentSheet}&staff=${staff}`);
            const data = await response.json();
            
            const fmt = (num) => "₹" + parseFloat(num).toLocaleString('en-IN', {minimumFractionDigits: 2});

            document.getElementById('total-in').innerText = fmt(data.totalIn);
            document.getElementById('total-out').innerText = fmt(data.totalOut);
            document.getElementById('net-balance').innerText = fmt(data.balance);
            document.getElementById('sheet-title').innerText = (staff !== "All") ? staff + " Ledger" : currentSheet.toUpperCase();

            let hHTML = data.history.reverse().slice(0,30).map(item => {
                let isIn = parseFloat(item.in) > 0;
                let cls = isIn ? "color:green" : "color:red";
                return `<div class="history-item"><span>${item.desc}</span><b style="${cls}">${isIn ? '+₹'+item.in : '-₹'+item.out}</b></div>`;
            }).join('');
            hList.innerHTML = hHTML || "No records.";
        } catch (e) { hList.innerHTML = "Error! Please click Refresh."; }
    }

    function sendData(type) {
        let d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        if(!d || !a) return alert("Details and Amount bharein!");

        document.getElementById('status').innerText = "Saving...";
        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors',
            body: JSON.stringify({ targetSheet: currentSheet, description: d, amount: a, type: type })
        }).then(() => {
            document.getElementById('status').innerText = "✓ Saved!";
            document.getElementById('amt').value = '';
            setTimeout(fetchData, 1500);
            setTimeout(() => { document.getElementById('status').innerText = ""; }, 3000);
        });
    }

    window.onload = () => showSection('daily', document.querySelector('.nav-btn'));
</script>
</body>
</html>s
