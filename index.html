<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Krishan Rice Mills | Smart Ledger</title>
    <style>
        :root { --primary: #1b5e20; --secondary: #2e7d32; --accent: #ffd700; --red: #d32f2f; --bg: #f0f2f5; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: #333; }
        header { background: linear-gradient(135deg, var(--primary), #388e3c); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; }
        .nav-menu { display: flex; justify-content: center; gap: 8px; padding: 10px; background: white; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05); flex-wrap: wrap; }
        .nav-btn { background: #f8fafc; border: 1px solid #ddd; padding: 10px 15px; border-radius: 10px; cursor: pointer; font-weight: 600; color: var(--primary); transition: 0.3s; }
        .nav-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .balance-card { max-width: 950px; margin: 20px auto; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; padding: 25px; border-radius: 20px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .balance-grid { display: flex; justify-content: space-around; margin-top: 15px; background: rgba(255,255,255,0.1); padding: 15px; border-radius: 15px; }
        .balance-item div { font-size: 1.5rem; font-weight: bold; margin-top: 5px; }
        .main-wrapper { display: flex; max-width: 1250px; margin: 20px auto; gap: 25px; padding: 0 15px; }
        .panel { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        #input-panel { flex: 0 0 350px; height: fit-content; }
        #display-panel { flex: 1; }
        label { font-weight: bold; font-size: 0.9rem; color: var(--primary); display: block; margin-bottom: 5px; }
        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 1.5px solid #eee; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-in { flex: 1; background: var(--secondary); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-out { flex: 1; background: var(--red); color: white; padding: 15px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f4f7f4; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <h1>KRISHAN RICE MILLS</h1>
    <button style="position: absolute; right: 15px; top: 20px; background: var(--accent); border: none; padding: 8px 15px; border-radius: 50px; font-weight: bold; cursor: pointer;" onclick="fetchData()">🔄 Sync Data</button>
</header>

<div class="balance-card">
    <h3 id="sheet-title" style="margin:0; text-transform: uppercase;">DASHBOARD</h3>
    <div class="balance-grid">
        <div class="balance-item"><span>CASH IN (+)</span><div id="total-in">₹0</div></div>
        <div class="balance-item"><span>CASH OUT (-)</span><div id="total-out">₹0</div></div>
        <div class="balance-item" style="color:var(--accent)"><span>NET BALANCE</span><div id="net-balance">₹0</div></div>
    </div>
</div>

<div class="nav-menu">
    <button class="nav-btn active" onclick="showSection('daily', this)">Daily Cash</button>
    <button class="nav-btn" onclick="showSection('bank', this)">Bank</button>
    <button class="nav-btn" onclick="showSection('salary', this)">Staff</button>
    <button class="nav-btn" onclick="showSection('expenditure', this)">💸 Exp</button>
    <button class="nav-btn" onclick="showSection('karamjeet', this)">Karamjeet</button>
    <button class="nav-btn" onclick="showSection('sukhwinder', this)">Sukhwinder</button>
    <button class="nav-btn" onclick="showSection('jaswinder', this)">Jaswinder</button>
    <button class="nav-btn" style="background:#ff9800; color:white;" onclick="showSection('reports', this)">📊 YEARLY REPORT</button>
</div>

<div class="main-wrapper">
    <div id="input-panel" class="panel">
        <h3>New Entry</h3>
        <label>Date:</label>
        <input type="date" id="entryDate">
        
        <label>Quick Select Name/Type:</label>
        <div id="dropdown-container"></div>
        
        <label>Final Description:</label>
        <input type="text" id="desc" placeholder="Details yahan type karein...">
        
        <label>Amount (₹):</label>
        <input type="number" id="amt" placeholder="0.00">
        
        <div class="btn-group">
            <button class="btn-in" onclick="sendData('IN')">CASH IN</button>
            <button class="btn-out" onclick="sendData('OUT')">CASH OUT</button>
        </div>
        <div id="status" style="text-align:center; margin-top:10px; font-weight:bold;"></div>
    </div>

    <div id="display-panel" class="panel">
        <h3 id="panel-title">History Log</h3>
        <table id="main-table">
            <thead><tr><th>Date</th><th>Description</th><th>Cash In</th><th>Cash Out</th></tr></thead>
            <tbody id="list-body"></tbody>
        </table>
    </div>
</div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwzBsXNsaoyPutR0P3ohTbSMqTOoBxdMbtTZLjm-V1mLgAcGxRDfBdPh5oNvR1SH_F0/exec';
    let currentSheet = 'daily';

    // Master Lists
    const staffNames = ["Akash Munim", "Ashok Munim", "Akhil Foreman", "Satnaryan Rafu", "Malkeet Roti", "Kamlesh Labour", "Kaali Labour"];
    const bankNames = ["Pankaj Palish", "Shangam Enterprices", "Broken Payment", "Cash"];
    const expTypes = ["Electricity Bill", "Diesel", "Machine Repair", "Tea/Snacks", "Misc Exp"];
    const partnerNames = ["Karamjeet", "Sukhwinder", "Jaswinder"];

    window.onload = () => {
        document.getElementById('entryDate').value = new Date().toISOString().split('T')[0];
        showSection('daily', document.querySelector('.nav-btn'));
    };

    function showSection(sheet, btn) {
        currentSheet = sheet;
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        const inputPanel = document.getElementById('input-panel');
        
        if(sheet === 'reports') {
            inputPanel.style.display = 'none';
            fetchReports();
        } else {
            inputPanel.style.display = 'block';
            renderDropdown(sheet);
            fetchData();
        }
    }

    function renderDropdown(sheet) {
        const container = document.getElementById('dropdown-container');
        let options = '<option value="">-- Select or Type Manual --</option>';
        
        if(sheet === 'daily') {
            options += `<optgroup label="Partners">${partnerNames.map(n => `<option value="${n}">${n}</option>`).join('')}</optgroup>`;
            options += `<optgroup label="Staff">${staffNames.map(n => `<option value="${n} (Staff)">${n}</option>`).join('')}</optgroup>`;
            options += `<optgroup label="Banks">${bankNames.map(n => `<option value="${n} (Bank)">${n}</option>`).join('')}</optgroup>`;
        } else if(sheet === 'salary') {
            options += staffNames.map(n => `<option value="${n}">${n}</option>`).join('');
        } else if(sheet === 'bank') {
            options += bankNames.map(n => `<option value="${n}">${n}</option>`).join('');
        } else if(sheet === 'expenditure') {
            options += expTypes.map(n => `<option value="${n}">${n}</option>`).join('');
        } else if(partnerNames.map(p=>p.toLowerCase()).includes(sheet.toLowerCase())) {
            options += `<option value="${sheet.charAt(0).toUpperCase() + sheet.slice(1)} Entry">${sheet.charAt(0).toUpperCase() + sheet.slice(1)} Entry</option>`;
        }

        options += '<option value="CUSTOM">--- Type Manual / Custom ---</option>';
        container.innerHTML = `<select id="quickSelect" onchange="handleSelectChange(this.value)">${options}</select>`;
        
        // Default text clear
        document.getElementById('desc').value = "";
    }

    function handleSelectChange(val) {
        const descInput = document.getElementById('desc');
        if(val === "CUSTOM") {
            descInput.value = "";
            descInput.focus();
        } else if(val !== "") {
            descInput.value = val;
        }
    }

    async function fetchData() {
        const body = document.getElementById('list-body');
        body.innerHTML = "<tr><td colspan='4' style='text-align:center;'>🔄 Syncing...</td></tr>";
        try {
            const res = await fetch(`${scriptURL}?sheet=${currentSheet}&t=${new Date().getTime()}`);
            const data = await res.json();
            document.getElementById('sheet-title').innerText = currentSheet.toUpperCase();
            document.getElementById('total-in').innerText = "₹" + Number(data.totalIn).toLocaleString();
            document.getElementById('total-out').innerText = "₹" + Number(data.totalOut).toLocaleString();
            document.getElementById('net-balance').innerText = "₹" + Number(data.balance).toLocaleString();
            body.innerHTML = data.history.reverse().map(i => `<tr><td>${new Date(i.date).toLocaleDateString('en-IN')}</td><td>${i.desc}</td><td style="color:green">${i.in > 0 ? '₹'+Number(i.in).toLocaleString() : '-'}</td><td style="color:red">${i.out > 0 ? '₹'+Number(i.out).toLocaleString() : '-'}</td></tr>`).join('');
        } catch (e) { body.innerHTML = "<tr><td colspan='4'>Error loading.</td></tr>"; }
    }

    async function fetchReports() {
        const body = document.getElementById('list-body');
        body.innerHTML = "<tr><td colspan='5' style='text-align:center;'>Calculating...</td></tr>";
        try {
            const res = await fetch(`${scriptURL}?action=getReports`);
            const data = await res.json();
            body.innerHTML = Object.keys(data.monthly).map(m => {
                let r = data.monthly[m];
                return `<tr><td><b>${m}</b></td><td>₹${r.opening.toLocaleString()}</td><td style="color:green">+₹${r.in.toLocaleString()}</td><td style="color:red">-₹${r.out.toLocaleString()}</td><td><b>₹${r.closing.toLocaleString()}</b></td></tr>`;
            }).join('');
        } catch (e) { body.innerHTML = "Error."; }
    }

    function sendData(type) {
        const d = document.getElementById('desc').value;
        const a = document.getElementById('amt').value;
        const dt = document.getElementById('entryDate').value;
        if(!d || !a) return alert("Details and Amount missing!");
        document.getElementById('status').innerText = "⏳ Saving...";
        fetch(scriptURL, { method: 'POST', mode: 'no-cors', body: JSON.stringify({ targetSheet: currentSheet, description: d, amount: a, type: type, customDate: dt })})
        .then(() => {
            document.getElementById('status').innerText = "✓ Saved!";
            document.getElementById('amt').value = '';
            setTimeout(() => { fetchData(); document.getElementById('status').innerText = ""; }, 1500);
        });
    }
</script>
</body>
</html>
